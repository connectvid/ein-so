name: Deploy to VPS

# Auto-deploy: every push to main is shipped to the production VPS.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            echo "==> Deploying $GITHUB_SHA to $APP_DIR"
            cd "$APP_DIR"

            echo "==> Fetching latest main"
            git fetch --prune origin main
            git reset --hard origin/main

            echo "==> Installing dependencies (npm ci)"
            npm ci

            echo "==> Building (next build)"
            npm run build

            echo "==> Reloading app under PM2"
            pm2 restart ein-so --update-env
            pm2 save

            echo "==> Deploy complete"
